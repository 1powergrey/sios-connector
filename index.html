<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIOS Connector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0c;
    --surface: #161614;
    --border: #2a2926;
    --text: #e8e6e1;
    --muted: #6b6a67;
    --primary: #4f98a3;
    --primary-hover: #227f8b;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
  }
  .card {
    width: 100%;
    max-width: 480px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: center;
    margin: 24px;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: oklch(0.38 0.07 192 / 0.15);
    border: 1px solid oklch(0.38 0.07 192 / 0.3);
    border-radius: 14px;
    margin-bottom: 24px;
  }
  .logo svg { width: 28px; height: 28px; color: var(--primary); }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 36px;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 180ms ease;
    width: 100%;
    justify-content: center;
    margin-bottom: 12px;
  }
  .btn:hover { background: var(--primary-hover); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.875rem;
    font-weight: 400;
  }
  .btn-ghost:hover { background: #1e1d1b; color: var(--text); }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }
  .meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .meta a { color: var(--muted); text-decoration: none; }
  .meta a:hover { color: var(--text); }
  .badge {
    display: inline-block;
    background: oklch(0.38 0.07 192 / 0.12);
    color: var(--primary);
    border: 1px solid oklch(0.38 0.07 192 / 0.25);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="badge">OpenAPI 3.1</div>
  <h1>SIOS Connector</h1>
  <p class="sub">Strategic Intelligence Operating System. One-click connect to any platform that supports OpenAPI or custom connectors.</p>

  <a class="btn" href="https://raw.githubusercontent.com/1powergrey/sios-connector/main/openapi.yaml" target="_blank" rel="noopener noreferrer">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download openapi.yaml
  </a>

  <a class="btn btn-ghost" href="https://editor.swagger.io/?url=https://raw.githubusercontent.com/1powergrey/sios-connector/main/openapi.yaml" target="_blank" rel="noopener noreferrer">
    Preview in Swagger Editor
  </a>

  <div class="divider"></div>

  <div class="meta">
    <a href="https://github.com/1powergrey/sios-connector" target="_blank">GitHub</a>
    <a href="https://raw.githubusercontent.com/1powergrey/sios-connector/main/openapi.yaml" target="_blank">Raw Spec</a>
    <span>v1.0.0</span>
  </div>
</div>
</body>
</html>
